{% extends 'StaffManage/base.html' %}

{% block title %}员工档案 - 智慧交通员工信息管理系统{% endblock %}

{% block breadcrumb %}员工档案{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <span class="card-title"><i class="fas fa-users" style="color:var(--accent);margin-right:6px;"></i>员工列表</span>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-success btn-sm" onclick="openAddModal()">
        <i class="fas fa-plus"></i> 新增员工
      </button>
      <a href="/employee/export" class="btn btn-primary btn-sm">
        <i class="fas fa-download"></i> 导出CSV
      </a>
    </div>
  </div>
  <div class="card-body">
    <div class="search-bar row" style="margin-bottom:16px;">
      <div class="col-md-2">
        <input type="text" id="search_name" placeholder="姓名" class="form-control">
      </div>
      <div class="col-md-2">
        <input type="text" id="search_emp_no" placeholder="工号" class="form-control">
      </div>
      <div class="col-md-2">
        <select id="search_department" class="form-control">
          <option value="">全部部门</option>
          {% for dept in departments %}
          <option value="{{ dept.id }}">{{ dept.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <select id="search_status" class="form-control">
          <option value="">全部状态</option>
          <option value="ONBOARD">在职</option>
          <option value="PROBATION">试用期</option>
          <option value="LEAVE">离职</option>
          <option value="RETIRED">退休</option>
        </select>
      </div>
      <div class="col-md-2">
        <select id="search_gender" class="form-control">
          <option value="">全部性别</option>
          <option value="M">男</option>
          <option value="F">女</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary btn-block" onclick="doSearch()">
          <i class="fas fa-search"></i> 查询
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover" id="empTable">
        <thead>
          <tr>
            <th>工号</th>
            <th>姓名</th>
            <th>性别</th>
            <th>手机</th>
            <th>部门</th>
            <th>职位</th>
            <th>状态</th>
            <th>入职日期</th>
            <th style="width:180px;">操作</th>
          </tr>
        </thead>
        <tbody id="empTableBody"></tbody>
      </table>
    </div>
    <div id="pagination" style="text-align:center;margin-top:12px;"></div>
  </div>
</div>

<div class="modal fade" id="empModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        <h4 class="modal-title" id="empModalTitle">新增员工</h4>
      </div>
      <div class="modal-body" style="max-height:70vh;overflow-y:auto;">
        <div class="row">
          <div class="col-md-6 form-group">
            <label>工号 *</label>
            <input type="text" class="form-control" id="emp_no" required>
          </div>
          <div class="col-md-6 form-group">
            <label>姓名 *</label>
            <input type="text" class="form-control" id="name" required>
          </div>
          <div class="col-md-6 form-group">
            <label>性别 *</label>
            <select class="form-control" id="gender" required>
              <option value="M">男</option>
              <option value="F">女</option>
            </select>
          </div>
          <div class="col-md-6 form-group">
            <label>身份证号 *</label>
            <input type="text" class="form-control" id="id_card" maxlength="18" required>
          </div>
          <div class="col-md-6 form-group">
            <label>出生日期 *</label>
            <input type="date" class="form-control" id="birth_date" required>
          </div>
          <div class="col-md-6 form-group">
            <label>手机号码 *</label>
            <input type="text" class="form-control" id="phone" maxlength="20" required>
          </div>
          <div class="col-md-6 form-group">
            <label>电子邮箱 *</label>
            <input type="email" class="form-control" id="email" required>
          </div>
          <div class="col-md-6 form-group">
            <label>婚姻状况</label>
            <select class="form-control" id="marital_status">
              <option value="S">未婚</option>
              <option value="M">已婚</option>
              <option value="D">离异</option>
              <option value="W">丧偶</option>
            </select>
          </div>
          <div class="col-md-6 form-group">
            <label>血型</label>
            <select class="form-control" id="blood_type">
              <option value="">--</option>
              <option value="A">A型</option>
              <option value="B">B型</option>
              <option value="O">O型</option>
              <option value="AB">AB型</option>
            </select>
          </div>
          <div class="col-md-6 form-group">
            <label>籍贯</label>
            <input type="text" class="form-control" id="native_place">
          </div>
          <div class="col-md-6 form-group">
            <label>现住地址</label>
            <input type="text" class="form-control" id="address">
          </div>
          <div class="col-md-6 form-group">
            <label>紧急联系人</label>
            <input type="text" class="form-control" id="emergency_contact">
          </div>
          <div class="col-md-6 form-group">
            <label>紧急联系电话</label>
            <input type="text" class="form-control" id="emergency_phone">
          </div>
          <div class="col-md-6 form-group">
            <label>部门 *</label>
            <select class="form-control" id="department_id" required onchange="loadPositions()">
              <option value="">请选择部门</option>
              {% for dept in departments %}
              <option value="{{ dept.id }}">{{ dept.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6 form-group">
            <label>职位 *</label>
            <select class="form-control" id="position_id" required>
              <option value="">请先选择部门</option>
            </select>
          </div>
          <div class="col-md-6 form-group">
            <label>员工状态</label>
            <select class="form-control" id="status">
              <option value="PROBATION">试用期</option>
              <option value="ONBOARD">在职</option>
              <option value="LEAVE">离职</option>
              <option value="RETIRED">退休</option>
            </select>
          </div>
          <div class="col-md-6 form-group">
            <label>入职日期 *</label>
            <input type="date" class="form-control" id="hire_date" required>
          </div>
          <div class="col-md-6 form-group">
            <label>合同起始日</label>
            <input type="date" class="form-control" id="contract_start">
          </div>
          <div class="col-md-6 form-group">
            <label>合同终止日</label>
            <input type="date" class="form-control" id="contract_end">
          </div>
          <div class="col-md-6 form-group">
            <label>社保账号</label>
            <input type="text" class="form-control" id="social_security_no">
          </div>
          <div class="col-md-6 form-group">
            <label>工资卡号</label>
            <input type="text" class="form-control" id="bank_card_no">
          </div>
          <div class="col-md-6 form-group">
            <label>开户银行</label>
            <input type="text" class="form-control" id="bank_name">
          </div>
          <div class="col-md-12 form-group">
            <label>备注</label>
            <textarea class="form-control" id="remark" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="btnSaveEmp">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        <h4 class="modal-title">员工详情</h4>
      </div>
      <div class="modal-body" id="detailContent" style="max-height:70vh;overflow-y:auto;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block javascript %}
<script>
var currentEditId = null;

function loadPositions(deptId) {
    var deptId = deptId || $('#department_id').val();
    if (!deptId) return;
    $.get('/api/positions?department_id=' + deptId, function(res) {
        var html = '<option value="">请选择职位</option>';
        res.data.forEach(function(p) {
            html += '<option value="' + p.id + '">' + p.name + ' (' + p.level + ')</option>';
        });
        $('#position_id').html(html);
    });
}

function doSearch() {
    $.post('/employee/api/list', {
        name: $('#search_name').val(),
        emp_no: $('#search_emp_no').val(),
        department_id: $('#search_department').val(),
        status: $('#search_status').val(),
        gender: $('#search_gender').val()
    }, function(res) {
        renderTable(res.data);
    });
}

function renderTable(data) {
    var html = '';
    data.forEach(function(e) {
        var statusClass = 'badge-' + e.status.toLowerCase().replace('probation','probation').replace('onboard','onboard').replace('leave','leave').replace('retired','retired');
        html += '<tr>' +
            '<td>' + e.emp_no + '</td>' +
            '<td><a href="javascript:void(0)" onclick="showDetail(' + e.id + ')">' + e.name + '</a></td>' +
            '<td>' + e.gender + '</td>' +
            '<td>' + e.phone + '</td>' +
            '<td>' + e.department + '</td>' +
            '<td>' + e.position + '</td>' +
            '<td><span class="badge-status ' + statusClass + '">' + e.status + '</span></td>' +
            '<td>' + e.hire_date + '</td>' +
            '<td class="action-btns">' +
            '<button class="btn btn-primary btn-xs" onclick="editEmp(' + e.id + ')"><i class="fas fa-edit"></i> 编辑</button>' +
            '<button class="btn btn-danger btn-xs" onclick="deleteEmp(' + e.id + ')"><i class="fas fa-trash"></i> 删除</button>' +
            '</td></tr>';
    });
    if (!html) html = '<tr><td colspan="9" class="text-center text-muted">暂无数据</td></tr>';
    $('#empTableBody').html(html);
}

function openAddModal() {
    currentEditId = null;
    $('#empModalTitle').text('新增员工');
    $('#empModal input, #empModal select, #empModal textarea').val('');
    $('#gender').val('M');
    $('#marital_status').val('S');
    $('#status').val('PROBATION');
    $('#empModal').modal('show');
}

function editEmp(id) {
    currentEditId = id;
    $.get('/employee/detail/' + id, function(res) {
        var e = res.employee;
        $('#emp_no').val(e.emp_no); $('#emp_no').attr('readonly', true);
        $('#name').val(e.name); $('#gender').val(e.gender);
        $('#id_card').val(e.id_card); $('#birth_date').val(e.birth_date);
        $('#phone').val(e.phone); $('#email').val(e.email);
        $('#marital_status').val(e.marital_status); $('#blood_type').val(e.blood_type);
        $('#native_place').val(e.native_place); $('#address').val(e.address);
        $('#emergency_contact').val(e.emergency_contact); $('#emergency_phone').val(e.emergency_phone);
        $('#department_id').val(e.department).trigger('change');
        setTimeout(function() {
            $('#position_id').val(e.position_id);
        }, 300);
        $('#status').val(e.status); $('#hire_date').val(e.hire_date);
        $('#contract_start').val(e.contract_start); $('#contract_end').val(e.contract_end);
        $('#social_security_no').val(e.social_security_no);
        $('#bank_card_no').val(e.bank_card_no); $('#bank_name').val(e.bank_name);
        $('#remark').val(e.remark);
        $('#empModalTitle').text('编辑员工');
        $('#empModal').modal('show');
    });
}

function showDetail(id) {
    $.get('/employee/detail/' + id, function(res) {
        var e = res.employee;
        var html = '<div class="row">';
        html += '<div class="col-md-6"><p><strong>工号：</strong>' + e.emp_no + '</p></div>';
        html += '<div class="col-md-6"><p><strong>姓名：</strong>' + e.name + '</p></div>';
        html += '<div class="col-md-6"><p><strong>性别：</strong>' + e.gender_display + '</p></div>';
        html += '<div class="col-md-6"><p><strong>手机：</strong>' + e.phone + '</p></div>';
        html += '<div class="col-md-6"><p><strong>邮箱：</strong>' + e.email + '</p></div>';
        html += '<div class="col-md-6"><p><strong>身份证：</strong>' + e.id_card + '</p></div>';
        html += '<div class="col-md-6"><p><strong>出生日期：</strong>' + e.birth_date + '</p></div>';
        html += '<div class="col-md-6"><p><strong>部门：</strong>' + e.department_name + '</p></div>';
        html += '<div class="col-md-6"><p><strong>职位：</strong>' + e.position_name + '</p></div>';
        html += '<div class="col-md-6"><p><strong>状态：</strong><span class="badge-status badge-' + e.status.toLowerCase() + '">' + e.status_display + '</span></p></div>';
        html += '<div class="col-md-6"><p><strong>入职日期：</strong>' + e.hire_date + '</p></div>';
        html += '<div class="col-md-6"><p><strong>籍贯：</strong>' + e.native_place + '</p></div>';
        html += '<div class="col-md-6"><p><strong>住址：</strong>' + e.address + '</p></div>';
        html += '<div class="col-md-6"><p><strong>紧急联系人：</strong>' + e.emergency_contact + '</p></div>';
        html += '<div class="col-md-6"><p><strong>紧急联系电话：</strong>' + e.emergency_phone + '</p></div>';
        html += '<div class="col-md-6"><p><strong>社保账号：</strong>' + e.social_security_no + '</p></div>';
        html += '<div class="col-md-6"><p><strong>工资卡：</strong>' + e.bank_card_no + '</p></div>';
        html += '<div class="col-md-6"><p><strong>开户行：</strong>' + e.bank_name + '</p></div>';
        html += '<div class="col-md-12"><p><strong>备注：</strong>' + (e.remark || '无') + '</p></div>';
        html += '</div>';
        $('#detailContent').html(html);
        $('#detailModal').modal('show');
    });
}

function deleteEmp(id) {
    if (!confirm('确认删除该员工？')) return;
    $.post('/employee/delete', {id: id}, function() {
        doSearch();
    });
}

$('#btnSaveEmp').click(function() {
    var data = {
        emp_no: $('#emp_no').val(),
        name: $('#name').val(),
        gender: $('#gender').val(),
        id_card: $('#id_card').val(),
        birth_date: $('#birth_date').val(),
        phone: $('#phone').val(),
        email: $('#email').val(),
        marital_status: $('#marital_status').val(),
        blood_type: $('#blood_type').val(),
        native_place: $('#native_place').val(),
        address: $('#address').val(),
        emergency_contact: $('#emergency_contact').val(),
        emergency_phone: $('#emergency_phone').val(),
        department_id: $('#department_id').val(),
        position_id: $('#position_id').val(),
        status: $('#status').val(),
        hire_date: $('#hire_date').val(),
        contract_start: $('#contract_start').val(),
        contract_end: $('#contract_end').val(),
        social_security_no: $('#social_security_no').val(),
        bank_card_no: $('#bank_card_no').val(),
        bank_name: $('#bank_name').val(),
        remark: $('#remark').val(),
    };
    if (!currentEditId) {
        $.ajax({
            url: '/employee/create',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                $('#empModal').modal('hide');
                doSearch();
            },
            error: function(xhr) {
                alert('保存失败: ' + xhr.responseText);
            }
        });
    } else {
        $.ajax({
            url: '/employee/update/' + currentEditId,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                $('#empModal').modal('hide');
                doSearch();
            },
            error: function(xhr) {
                alert('保存失败: ' + xhr.responseText);
            }
        });
    }
});

$('#department_id').on('change', loadPositions);

$(function() {
    doSearch();
});
</script>
{% endblock %}
