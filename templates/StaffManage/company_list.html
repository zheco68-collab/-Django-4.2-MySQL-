{% extends 'StaffManage/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">投保公司管理</h6>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-12">
                    <a href="/company/create" class="btn btn-success">
                        <i class="fas fa-plus"></i> 添加投保公司
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>公司名称</th>
                            <th>公司编码</th>
                            <th>联系人</th>
                            <th>联系电话</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for company in companies %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                            <td>{{ company.name }}</td>
                            <td>{{ company.code }}</td>
                            <td>{{ company.contact|default:'' }}</td>
                            <td>{{ company.phone|default:'' }}</td>
                            <td>
                                <a href="/company/update/{{ company.id }}" class="btn btn-sm btn-info">编辑</a>
                                <button class="btn btn-sm btn-danger delete-btn" data-id="{{ company.id }}">删除</button>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="6" class="text-center">暂无数据</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $('.delete-btn').click(function() {
        var id = $(this).data('id');
        if (confirm('确定要删除该公司吗？')) {
            $.ajax({
                url: '/company/delete/' + id,
                type: 'POST',
                headers: {'X-CSRFToken': $('input[name="csrfmiddlewaretoken"]').val()},
                success: function(data) {
                    if (data.success) {
                        alert(data.message);
                        location.reload();
                    } else {
                        alert(data.message);
                    }
                }
            });
        }
    });
});
</script>
{% endblock %}
